<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cerebra — Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #050508 0%, #0a0a12 100%);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .offline-container {
        text-align: center;
        padding: 2rem;
        max-width: 500px;
        animation: fadeIn 0.6s ease-in-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .icon {
        font-size: 4rem;
        margin-bottom: 1rem;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.7;
          transform: scale(1.05);
        }
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, #4cc9f0 0%, #f72585 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      p {
        font-size: 1.1rem;
        color: #b0b0b8;
        margin-bottom: 2rem;
        line-height: 1.6;
      }

      .status {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 2rem;
        font-size: 0.9rem;
        color: #8b8b95;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #f72585;
        animation: blink 1s ease-in-out infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      button {
        background: linear-gradient(135deg, #4cc9f0 0%, #f72585 100%);
        color: #fff;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 0.5rem;
        font-size: 1rem;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        margin-top: 1rem;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(79, 201, 240, 0.2);
      }

      button:active {
        transform: translateY(0);
      }

      .cached-pages {
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid #2a2a34;
        font-size: 0.9rem;
      }

      .cached-pages h3 {
        margin-bottom: 1rem;
        color: #4cc9f0;
      }

      .cached-pages a {
        display: inline-block;
        margin: 0.5rem;
        padding: 0.5rem 1rem;
        background: rgba(79, 201, 240, 0.1);
        border: 1px solid #4cc9f0;
        border-radius: 0.25rem;
        color: #4cc9f0;
        text-decoration: none;
        transition: all 0.2s;
      }

      .cached-pages a:hover {
        background: rgba(79, 201, 240, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="offline-container">
      <div class="icon">🧠</div>
      <h1>You're Offline</h1>
      <p>
        Cerebra requires an internet connection to explore the knowledge
        network. Check your connection and try again.
      </p>
      <div class="status">
        <div class="status-dot"></div>
        <span>Waiting for connection...</span>
      </div>
      <button onclick="location.reload()">Try Again</button>

      <div class="cached-pages">
        <h3>Recently Visited</h3>
        <a href="/">Back to Home</a>
      </div>
    </div>

    <script>
      // Listen for online/offline events
      window.addEventListener("online", () => {
        console.log("Connection restored!")
        setTimeout(() => {
          location.reload()
        }, 1000)
      })

      window.addEventListener("offline", () => {
        console.log("Connection lost")
      })

      // Auto-refresh when connection is restored
      if (navigator.onLine) {
        setTimeout(() => {
          location.reload()
        }, 1000)
      }
    </script>
  </body>
</html>
