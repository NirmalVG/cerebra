services:
  - type: web
    name: cerebra-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false # you'll enter this in Render dashboard
      - key: TAVILY_API_KEY
        sync: false
      - key: WIKI_CONTACT_EMAIL
        sync: false
      - key: WIKI_GITHUB_URL
        sync: false
